[build]
  command = "pnpm --filter @workspace/vemat build"
  publish = "artifacts/vemat/dist"

[functions]
  directory = "artifacts/vemat/netlify/functions"

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/linkedin-sync"
  to = "/.netlify/functions/linkedin-sync"
  status = 200
